font_family      Lilex
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 14.0

shell_integration enabled no-cursor

tab_bar_edge bottom

cursor_blink_interval 0
cursor_shape block

remember_window_size  no
initial_window_width  90c
initial_window_height 34c

# BEGIN_KITTY_THEME
include current-theme.conf
# END_KITTY_THEME
